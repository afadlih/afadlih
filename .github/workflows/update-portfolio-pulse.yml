name: Update Portfolio Pulse

on:
  workflow_dispatch:
  schedule:
    # Every Monday at 06:00 WIB / Sunday 23:00 UTC.
    - cron: "0 23 * * 0"

permissions:
  contents: write

jobs:
  update-portfolio-pulse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update Live Portfolio Pulse
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/update_portfolio_pulse.py

      - name: Commit updated README
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update live portfolio pulse"
          file_pattern: README.md
