name: Update Portfolio Pulse

on:
  workflow_dispatch:
  schedule:
    # Every Monday at 06:00 WIB / Sunday 23:00 UTC.
    - cron: "0 23 * * 0"

permissions:
  contents: write

jobs:
  update-portfolio-pulse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update Live Portfolio Pulse
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/update_portfolio_pulse.py

      - name: Commit updated README
        run: |
          if git diff --quiet README.md; then
            echo "No README changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update live portfolio pulse"
          git push
